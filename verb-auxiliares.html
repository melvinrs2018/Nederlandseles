<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Verbos Holandeses</title>
  <style>
    :root { --bg: #1a252f; --surface: #2c3e50; --accent: #3498db; --correct: #27ae60; --wrong: #c0392b; --text: #ecf0f1; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { background: var(--surface); height: 10vh; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; max-width: 500px; margin: auto; }
    .card { background: var(--surface); padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; }
    .card.selected { border: 2px solid var(--accent); }
    .card.matched { visibility: hidden; }
  </style>
</head>
<body>

<header>
  <h1>VERBOS</h1>
  <a href="index.html" style="color: white; text-decoration: none;">⬅️ Voltar</a>
</header>

<div class="grid" id="grid"></div>

<script>
// Lista estrita baseada nas imagens enviadas
const ALL_DATA = [
  {nl:"zijn", pt:"ser/estar"}, {nl:"hebben", pt:"ter"}, {nl:"gaan", pt:"ir"},
  {nl:"willen", pt:"querer"}, {nl:"kunnen", pt:"poder"}, {nl:"mogen", pt:"poder"},
  {nl:"moeten", pt:"dever/precisar"}, {nl:"zullen", pt:"futuro/sugestão"}, {nl:"worden", pt:"se tornar"},
  {nl:"ademen", pt:"respirar"}, {nl:"draaien", pt:"girar"}, {nl:"kruipen", pt:"engatinhar"},
  {nl:"trekken", pt:"puxar"}, {nl:"duwen", pt:"empurrar"}, {nl:"duiken", pt:"mergulhar"},
  {nl:"liefhebben", pt:"amar"}, {nl:"lijken", pt:"parecer(opinião)"}, {nl:"schijnen", pt:"parecer(dizem)"},
  {nl:"blijken", pt:"parecer(fato)"}, {nl:"sturen", pt:"enviar/volante"}, {nl:"huilen", pt:"chorar"},
  {nl:"klagen", pt:"reclamar"}, {nl:"wennen", pt:"acostumar"}, {nl:"regelen", pt:"organizar"},
  {nl:"stijgen", pt:"subir(níveis)"}, {nl:"dalen", pt:"baixar(níveis)"}, {nl:"lukken", pt:"conseguir"},
  {nl:"wisselen", pt:"trocar"}, {nl:"wensen", pt:"desejar"}, {nl:"vechten", pt:"lutar"},
  {nl:"regeren", pt:"governar"}, {nl:"regenen", pt:"chover"}, {nl:"lijden", pt:"sofrer"},
  {nl:"leiden", pt:"liderar"}, {nl:"merken", pt:"perceber"}, {nl:"drukken", pt:"apertar"},
  {nl:"tonen", pt:"mostrar"}, {nl:"drijven", pt:"flotar"}, {nl:"scheiden", pt:"separar"},
  {nl:"demonstreren", pt:"protestar"}, {nl:"stemmen", pt:"votar"}, {nl:"weigeren", pt:"recusar"},
  {nl:"dreigen", pt:"ameaçar"}, {nl:"afscheid nemen", pt:"despedir"}, {nl:"kwetsen", pt:"machucar"},
  {nl:"waarschuwen", pt:"avisar"}, {nl:"teleurstellen", pt:"decepcionar"}, {nl:"scheuren", pt:"rasgar"}, {nl:"trillen", pt:"tremer"}
];

// Lógica de renderização
const grid = document.getElementById('grid');
let selected = [];

function createBoard() {
  let combined = [];
  ALL_DATA.forEach(item => {
    combined.push({text: item.nl, id: item.nl}, {text: item.pt, id: item.nl});
  });
  combined.sort(() => Math.random() - 0.5);
  
  combined.forEach(item => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerText = item.text;
    div.onclick = () => {
      div.classList.add('selected');
      selected.push({el: div, id: item.id});
      if(selected.length === 2) {
        if(selected[0].id === selected[1].id) {
          selected.forEach(s => s.el.classList.add('matched'));
        }
        setTimeout(() => {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
          selected = [];
        }, 500);
      }
    };
    grid.appendChild(div);
  });
}
createBoard();
</script>
</body>
</html>
