<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Verbos & Auxiliares</title>
  <style>
    :root {
      --bg: #1a252f; --surface: #2c3e50; --accent: #3498db;
      --correct: #27ae60; --wrong: #c0392b; --text: #ecf0f1;
    }
    * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
    header { background: var(--surface); height: 10vh; min-height: 50px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
    header h1 { font-size: clamp(0.8rem, 4vw, 1.1rem); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
    .header-actions { display: flex; align-items: center; gap: 15px; }
    .voice-toggle { background: none; border: none; cursor: pointer; color: white; font-size: clamp(20px, 6vw, 28px); padding: 5px; }
    .stats { height: 7vh; display: flex; gap: 20px; justify-content: center; align-items: center; font-weight: bold; flex-shrink: 0; background: rgba(0,0,0,0.1); }
    .grid-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; width: 100%; overflow: hidden; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 450px; height: 100%; }
    .card { background: var(--surface); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); text-align: center; transition: 0.1s; padding: 4px; }
    .card:active { transform: scale(0.96); }
    .card.selected { border: 3px solid var(--accent); background: #34495e; box-shadow: 0 0 10px rgba(52, 152, 219, 0.3); }
    .card.matched { visibility: hidden; pointer-events: none; }
    .visual { font-size: clamp(24px, 7vw, 32px); margin-bottom: 2px; }
    .nl-text { font-weight: bold; font-size: clamp(0.7rem, 3.5vw, 1rem); text-transform: uppercase; color: #fff; }
    .pt-sub { font-size: clamp(0.6rem, 3vw, 0.8rem); color: #bdc3c7; font-weight: bold; }
    #celebration { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  </style>
</head>
<body>

<header>
  <h1>VERBOS</h1>
  <div class="header-actions">
    <a href="index.html" style="text-decoration: none; color: white; font-size: 24px;">⬅️</a>
    <button id="voiceBtn" class="voice-toggle" onclick="toggleAudio()">🎧</button>
  </div>
</header>

<div class="stats">
  <span style="color:var(--correct)">✓ <span id="ok">0</span></span>
  <span style="color:var(--wrong)">✗ <span id="err">0</span></span>
  <span style="font-size: 0.8rem; color: #7f8c8d;">TOTAL: <span id="prog">0</span>/48</span>
</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<div id="celebration">
  <h2>Concluído com Sucesso!</h2>
  <button style="margin-top:20px; padding:15px 30px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="location.reload()">RECOMEÇAR</button>
</div>

<script>
// Apenas as palavras das suas imagens
const ALL_DATA = [
  {nl:"zijn", pt:"ser/estar", art:"👤"}, {nl:"hebben", pt:"ter", art:"📦"}, {nl:"gaan", pt:"ir", art:"🚶"},
  {nl:"willen", pt:"querer", art:"💭"}, {nl:"kunnen", pt:"poder", art:"🧠"}, {nl:"mogen", pt:"poder", art:"✅"},
  {nl:"moeten", pt:"dever/precisar", art:"⚠️"}, {nl:"zullen", pt:"aux.futuro", art:"📅"}, {nl:"worden", pt:"se tornar", art:"➡️"},
  {nl:"ademen", pt:"respirar", art:"🫁"}, {nl:"draaien", pt:"girar", art:"🔄"}, {nl:"kruipen", pt:"engatinhar", art:"👶"},
  {nl:"trekken", pt:"puxar", art:"🪢"}, {nl:"duwen", pt:"empurrar", art:"✋"}, {nl:"duiken", pt:"mergulhar", art:"🤿"},
  {nl:"liefhebben", pt:"amar", art:"❤️"}, {nl:"lijken", pt:"parecer", art:"👁️"}, {nl:"schijnen", pt:"parecer", art:"🗣️"},
  {nl:"blijken", pt:"parecer", art:"🔍"}, {nl:"sturen", pt:"enviar", art:"🚗"}, {nl:"huilen", pt:"chorar", art:"😭"},
  {nl:"klagen", pt:"reclamar", art:"🗯️"}, {nl:"wennen", pt:"acostumar", art:"⏳"}, {nl:"regelen", pt:"organizar", art:"📋"},
  {nl:"stijgen", pt:"subir", art:"📈"}, {nl:"dalen", pt:"baixar", art:"📉"}, {nl:"lukken", pt:"conseguir", art:"🎯"},
  {nl:"wisselen", pt:"trocar", art:"💱"}, {nl:"wensen", pt:"desejar", art:"✨"}, {nl:"vechten", pt:"lutar", art:"🥊"},
  {nl:"regeren", pt:"governar", art:"👑"}, {nl:"regenen", pt:"chover", art:"🌧️"}, {nl:"lijden", pt:"sofrer", art:"🥀"},
  {nl:"leiden", pt:"liderar", art:"🔝"}, {nl:"merken", pt:"perceber", art:"💡"}, {nl:"drukken", pt:"apertar", art:"🔘"},
  {nl:"tonen", pt:"mostrar", art:"🖼️"}, {nl:"drijven", pt:"flotar", art:"⛵"}, {nl:"scheiden", pt:"separar", art:"💔"},
  {nl:"demonstreren", pt:"protestar", art:"📢"}, {nl:"stemmen", pt:"votar", art:"🗳️"}, {nl:"weigeren", pt:"recusar", art:"🚫"},
  {nl:"dreigen", pt:"ameaçar", art:"⚠️"}, {nl:"afscheid nemen", pt:"despedir", art:"👋"}, {nl:"kwetsen", pt:"machucar", art:"🩹"},
  {nl:"waarschuwen", pt:"avisar", art:"📢"}, {nl:"teleurstellen", pt:"decepcionar", art:"😞"}, {nl:"scheuren", pt:"rasgar", art:"✂️"}, {nl:"trillen", pt:"tremer", art:"🫨"}
];

// MANTENDO A ESTRUTURA ORIGINAL QUE VOCÊ JÁ CONHECE
let audioEnabled = true, currentIdx = 0, batchSize = 5, selected = [], ok = 0, err = 0;
function toggleAudio() { audioEnabled = !audioEnabled; document.getElementById('voiceBtn').style.opacity = audioEnabled ? "1" : "0.3"; }
function speakNL(text) { if (!audioEnabled) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'nl-NL'; window.speechSynthesis.speak(msg); }
function loadBatch() {
  const grid = document.getElementById('grid'); grid.innerHTML = ''; selected = [];
  let batchWords = ALL_DATA.slice(currentIdx, currentIdx + batchSize);
  let cards = [];
  batchWords.forEach(w => { cards.push({ ...w, type: 'art' }); cards.push({ ...w, type: 'txt' }); });
  cards.sort(() => Math.random() - 0.5).forEach(card => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = card.type === 'art' ? `<span class="visual">${card.art}</span><span class="pt-sub">${card.pt}</span>` : `<span class="nl-text">${card.nl}</span>`;
    div.onclick = () => { if (card.type === 'txt') speakNL(card.nl); handleSelect(card, div, batchWords.length); };
    grid.appendChild(div);
  });
}
function handleSelect(card, el, totalBatch) {
  if (selected.length === 2 || el.classList.contains('selected')) return;
  el.classList.add('selected'); selected.push({ card, el });
  if (selected.length === 2) {
    const [a, b] = selected;
    if (a.card.nl === b.card.nl && a.card.type !== b.card.type) {
      ok++; document.getElementById('ok').innerText = ok; document.getElementById('prog').innerText = ok * 2;
      setTimeout(() => { a.el.classList.add('matched'); b.el.classList.add('matched');
        if (document.querySelectorAll('.matched').length === totalBatch * 2) {
          if (currentIdx + batchSize >= ALL_DATA.length) document.getElementById('celebration').style.display = 'flex';
          else { currentIdx += batchSize; loadBatch(); }
        }
      }, 400);
      selected = [];
    } else { err++; document.getElementById('err').innerText = err; setTimeout(() => { a.el.classList.remove('selected'); b.el.classList.remove('selected'); selected = []; }, 500); }
  }
}
loadBatch();
</script>
</body>
</html>
