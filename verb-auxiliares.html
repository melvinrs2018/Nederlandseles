<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Verbos Auxiliares</title>
    <style>
        body { background: #1a252f; color: white; font-family: sans-serif; margin: 0; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #34495e; }
        .stats { text-align: center; margin: 10px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; max-width: 600px; margin: auto; }
        .card { background: #2c3e50; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; }
        .icon { display: block; font-size: 30px; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <span>VERBOS AUXILIARES</span>
    <span>🎧</span>
</header>

<div class="stats">✓ 0 ✗ 0 TOTAL: 0/18</div>

<div class="grid" id="grid"></div>

<script>
const data = [
    { nl: "ZIJN", pt: "ser / estar", icon: "👤" },
    { nl: "HEBBEN", pt: "ter", icon: "📦" },
    { nl: "GAAN", pt: "ir", icon: "🚶" },
    { nl: "WILLEN", pt: "querer", icon: "💭" },
    { nl: "KUNNEN", pt: "poder", icon: "🧠" },
    { nl: "MOGEN", pt: "poder", icon: "✅" },
    { nl: "MOETEN", pt: "dever / precisar", icon: "⚠️" },
    { nl: "ZULLEN", pt: "futuro", icon: "📅" },
    { nl: "WORDEN", pt: "se tornar", icon: "➡️" }
];

const grid = document.getElementById('grid');
let cards = [];

data.forEach(item => {
    // Card NL
    cards.push({ html: item.nl, id: item.nl });
    // Card PT
    cards.push({ html: `<span class="icon">${item.icon}</span>${item.pt}`, id: item.nl });
});

cards.sort(() => Math.random() - 0.5);

cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = card.html;
    grid.appendChild(div);
});
</script>
</body>
</html>
