
<style>
* { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
body { margin: 0; padding: 0; }
.game-wrap {
  background: #1a252f;
  color: #ecf0f1;
  font-family: sans-serif;
  min-height: 520px;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.g-header {
  background: #2c3e50;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #3498db;
}
.g-header h1 { margin: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
.stats {
  display: flex; gap: 20px; justify-content: center; align-items: center;
  font-weight: bold; padding: 8px; background: rgba(0,0,0,0.15); font-size: 0.85rem;
}
.grid-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 440px;
}
.card {
  background: #2c3e50;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.07);
  text-align: center;
  transition: transform 0.1s;
  padding: 10px 6px;
  min-height: 64px;
}
.card:active { transform: scale(0.96); }
.card.selected { border: 3px solid #3498db; background: #34495e; box-shadow: 0 0 10px rgba(52,152,219,0.3); }
.card.matched { visibility: hidden; pointer-events: none; }
.emoji { font-size: 1.5rem; margin-bottom: 2px; }
.nl-text { font-weight: bold; font-size: 0.95rem; text-transform: uppercase; color: #fff; }
.pt-sub { font-size: 0.72rem; color: #bdc3c7; font-weight: bold; }
.celebration {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px; text-align: center;
}
.restart-btn {
  margin-top: 20px; padding: 12px 28px; background: #3498db; color: white;
  border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem;
}
.voice-btn {
  background: none; border: none; cursor: pointer; color: white; font-size: 1.3rem; padding: 4px;
}
</style>

<div class="game-wrap" id="gameWrap">
  <div class="g-header">
    <h1>Verbos Neerlandeses</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="voice-btn" id="voiceBtn" onclick="toggleAudio()">🎧</button>
    </div>
  </div>
  <div class="stats">
    <span style="color:#27ae60">✓ <span id="ok">0</span></span>
    <span style="color:#c0392b">✗ <span id="err">0</span></span>
    <span style="font-size:0.75rem;color:#7f8c8d">TOTAL: <span id="prog">0</span>/9</span>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
  <div class="celebration" id="celebration">
    <div style="font-size:2.5rem">🎉</div>
    <h2 style="color:#ecf0f1">Concluído!</h2>
    <p style="color:#bdc3c7">Você revisou todos os 9 verbos!</p>
    <button class="restart-btn" onclick="restart()">RECOMEÇAR</button>
  </div>
</div>

<script>
const ALL_DATA = [
  { nl:"zijn",    pt:"ser / estar",              emoji:"🔵" },
  { nl:"hebben",  pt:"ter",                       emoji:"🤲" },
  { nl:"gaan",    pt:"ir",                        emoji:"🚶" },
  { nl:"willen",  pt:"querer",                    emoji:"💭" },
  { nl:"kunnen",  pt:"poder (capacidade)",        emoji:"💪" },
  { nl:"mogen",   pt:"poder (permissão)",         emoji:"✅" },
  { nl:"moeten",  pt:"dever / precisar",          emoji:"⚠️" },
  { nl:"zullen",  pt:"(futuro/condicional)",      emoji:"🔮" },
  { nl:"worden",  pt:"se tornar",                 emoji:"🦋" },
];

let audioEnabled = true, batchIdx = 0, batchSize = 5, selected = [], ok = 0, err = 0;
let totalMatched = 0;

function toggleAudio() {
  audioEnabled = !audioEnabled;
  document.getElementById('voiceBtn').style.opacity = audioEnabled ? "1" : "0.3";
}
function speakNL(text) {
  if (!audioEnabled) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'nl-NL';
  window.speechSynthesis.speak(u);
}

function loadBatch() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  selected = [];
  const batch = ALL_DATA.slice(batchIdx, batchIdx + batchSize);
  let cards = [];
  batch.forEach(w => {
    cards.push({ ...w, type: 'emoji' });
    cards.push({ ...w, type: 'txt' });
  });
  cards.sort(() => Math.random() - 0.5);
  cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card';
    if (card.type === 'emoji') {
      div.innerHTML = `<span class="emoji">${card.emoji}</span><span class="pt-sub">${card.pt}</span>`;
    } else {
      div.innerHTML = `<span class="nl-text">${card.nl}</span>`;
    }
    div.onclick = () => {
      if (card.type === 'txt') speakNL(card.nl);
      handleSelect(card, div, batch.length);
    };
    grid.appendChild(div);
  });
}

function handleSelect(card, el, batchLen) {
  if (selected.length === 2 || el.classList.contains('selected')) return;
  el.classList.add('selected');
  selected.push({ card, el });
  if (selected.length === 2) {
    const [a, b] = selected;
    if (a.card.nl === b.card.nl && a.card.type !== b.card.type) {
      ok++;
      totalMatched++;
      document.getElementById('ok').textContent = ok;
      document.getElementById('prog').textContent = totalMatched;
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        const matched = document.querySelectorAll('.matched').length;
        if (matched === batchLen * 2) {
          if (batchIdx + batchSize >= ALL_DATA.length) {
            document.getElementById('grid').parentElement.style.display = 'none';
            document.getElementById('celebration').style.display = 'flex';
          } else {
            setTimeout(() => { batchIdx += batchSize; loadBatch(); }, 400);
          }
        }
      }, 400);
      selected = [];
    } else {
      err++;
      document.getElementById('err').textContent = err;
      setTimeout(() => {
        a.el.classList.remove('selected');
        b.el.classList.remove('selected');
        selected = [];
      }, 500);
    }
  }
}

function restart() {
  batchIdx = 0; ok = 0; err = 0; totalMatched = 0; selected = [];
  document.getElementById('ok').textContent = 0;
  document.getElementById('err').textContent = 0;
  document.getElementById('prog').textContent = 0;
  document.getElementById('celebration').style.display = 'none';
  document.getElementById('grid').parentElement.style.display = 'flex';
  loadBatch();
}

loadBatch();
</script>
