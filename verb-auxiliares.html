<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Verbos Auxiliares</title>
  <style>
    :root { --bg: #1a252f; --surface: #2c3e50; --accent: #3498db; --correct: #27ae60; --wrong: #c0392b; --text: #ecf0f1; }
    * { box-sizing: border-box; touch-action: manipulation; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { background: var(--surface); height: 10vh; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
    header h1 { font-size: 1rem; text-transform: uppercase; margin: 0; }
    .stats { height: 7vh; display: flex; gap: 20px; justify-content: center; align-items: center; font-weight: bold; background: rgba(0,0,0,0.1); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; max-width: 450px; margin: auto; height: 80vh; }
    .card { background: var(--surface); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-align: center; border: 1px solid #444; }
    .card.selected { border: 3px solid var(--accent); background: #34495e; }
    .card.matched { visibility: hidden; }
  </style>
</head>
<body>

<header>
  <h1>VERBOS AUXILIARES</h1>
  <a href="index.html" style="color:white; text-decoration:none;">⬅️</a>
</header>

<div class="stats">
  <span style="color:var(--correct)">✓ <span id="ok">0</span></span>
  <span style="color:var(--wrong)">✗ <span id="err">0</span></span>
  <span>TOTAL: 0/18</span>
</div>

<div class="grid" id="grid"></div>

<script>
// Apenas os 9 verbos da sua lista de auxiliares
const ALL_DATA = [
  {nl:"zijn", pt:"ser / estar"}, {nl:"hebben", pt:"ter"}, {nl:"gaan", pt:"ir"},
  {nl:"willen", pt:"querer"}, {nl:"kunnen", pt:"poder"}, {nl:"mogen", pt:"poder"},
  {nl:"moeten", pt:"dever / precisar"}, {nl:"zullen", pt:"futuro/sugestão"}, {nl:"worden", pt:"se tornar"}
];

const grid = document.getElementById('grid');
let selected = [];
let ok = 0, err = 0;

let cards = [];
ALL_DATA.forEach(item => {
  cards.push({text: item.nl, id: item.nl}, {text: item.pt, id: item.nl});
});
cards.sort(() => Math.random() - 0.5);

cards.forEach(card => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerText = card.text;
  div.onclick = () => {
    if(selected.length < 2) {
      div.classList.add('selected');
      selected.push({el: div, id: card.id});
      if(selected.length === 2) {
        if(selected[0].id === selected[1].id) {
          ok++; document.getElementById('ok').innerText = ok;
          selected.forEach(s => s.el.classList.add('matched'));
        } else {
          err++; document.getElementById('err').innerText = err;
        }
        setTimeout(() => {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
          selected = [];
        }, 500);
      }
    }
  };
  grid.appendChild(div);
});
</script>
</body>
</html>
